<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igor Dev - Contatos WhatsApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
header{background:#1a1a1e;border:1px solid #27272a;border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
header h1{font-size:1.25rem;font-weight:600}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:500}
.status-badge.online{background:#065f46;color:#6ee7b7}
.status-badge.offline{background:#7f1d1d;color:#fca5a5}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.online{background:#34d399;box-shadow:0 0 6px #34d399}
.status-dot.offline{background:#f87171}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;background:#1a1a1e;border:1px solid #27272a;border-radius:8px;padding:10px 14px;color:#e4e4e7;font-size:.9rem;outline:none;transition:border-color .2s}
.search-box:focus{border-color:#22c55e}
.search-box::placeholder{color:#52525b}
.btn{padding:10px 18px;border-radius:8px;border:none;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#16a34a;color:#fff}
.btn-primary:hover{background:#15803d}
.btn-outline{background:transparent;border:1px solid #3f3f46;color:#a1a1aa}
.btn-outline:hover{background:#27272a;color:#e4e4e7}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:#1a1a1e;border:1px solid #27272a;border-radius:8px;padding:12px 16px;flex:1;min-width:120px}
.stat-card .value{font-size:1.5rem;font-weight:700}
.stat-card .label{font-size:.75rem;color:#71717a;margin-top:2px}
.stat-card.blocked .value{color:#f87171}
.table-wrapper{background:#1a1a1e;border:1px solid #27272a;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:.75rem;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #27272a;background:#18181b}
td{padding:12px 16px;border-bottom:1px solid #1f1f23;font-size:.9rem}
tr:last-child td{border-bottom:none}
tr.blocked-row{background:rgba(239,68,68,.06)}
tr.blocked-row td{color:#a1a1aa}
.contact-name{font-weight:500}
.contact-number{color:#71717a;font-size:.8rem;font-family:monospace}
.toggle-wrapper{display:flex;align-items:center}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;display:inline-block}
.toggle input{display:none}
.toggle-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#22c55e;border-radius:24px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:#52525b}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px)}
.toggle-label{margin-left:8px;font-size:.8rem;font-weight:500;min-width:55px}
.toggle-label.active{color:#4ade80}
.toggle-label.blocked{color:#f87171}
.empty-state{text-align:center;padding:48px 20px;color:#52525b}
.empty-state .icon{font-size:2rem;margin-bottom:8px}
.empty-state .err{color:#f87171}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid #3f3f46;border-top-color:#22c55e;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:16px;right:16px;padding:12px 20px;border-radius:8px;font-size:.85rem;font-weight:500;z-index:1000;animation:slideIn .2s ease;max-width:360px}
.toast.success{background:#065f46;color:#6ee7b7;border:1px solid #059669}
.toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid #dc2626}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;margin-left:4px}
.badge-blocked{background:#7f1d1d;color:#fca5a5}
.badge-you{background:#1e3a5f;color:#93c5fd}
.btn:disabled{opacity:.6;cursor:not-allowed}
@media(max-width:600px){.container{padding:12px}header{flex-direction:column;align-items:flex-start}.stats{flex-direction:column}th:nth-child(2),td:nth-child(2){display:none}}
</style>
</head>
<body>
<div class="container">
<header>
<div>
<h1>Igor Dev - Contatos WhatsApp</h1>
<div style="margin-top:4px;font-size:.8rem;color:#71717a">Gerenciamento do bot de atendimento</div>
</div>
<div style="display:flex;align-items:center;gap:8px">
<span class="status-badge" id="statusBadge">
<span class="status-dot" id="statusDot"></span>
<span id="statusText">Verificando...</span>
</span>
</div>
</header>

<div class="stats">
<div class="stat-card"><div class="value" id="totalContatos">-</div><div class="label">Contatos salvos</div></div>
<div class="stat-card blocked"><div class="value" id="totalBloqueados">-</div><div class="label">Contatos bloqueados</div></div>
</div>

<div class="toolbar">
<input type="text" class="search-box" id="searchInput" placeholder="Buscar por nome ou numero..." oninput="renderContacts()">
<button class="btn btn-outline" onclick="refreshContacts()" id="btnRefresh">&#8635; Atualizar</button>
<button class="btn btn-outline" onclick="toggleBlockedFilter()" id="btnFilterBlocked">Bloqueados</button>
</div>

<div class="table-wrapper">
<table>
<thead><tr><th>Contato</th><th>Numero</th><th style="width:140px">Bot</th></tr></thead>
<tbody id="contactsBody">
<tr><td colspan="3"><div class="empty-state"><div class="icon"><span class="loading-spinner" style="width:24px;height:24px;border-width:3px"></span></div><div id="loadingMsg">Carregando contatos...</div></div></td></tr>
</tbody>
</table>
</div>
</div>

<script>
var contacts = [];
var showOnlyBlocked = false;
var loading = true;
var loadError = null;

function setLoading(msg) {
    loading = true;
    loadError = null;
    var tbody = document.getElementById('contactsBody');
    document.getElementById('loadingMsg').textContent = msg || 'Carregando contatos...';
    tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><div class="icon"><span class="loading-spinner" style="width:24px;height:24px;border-width:3px"></span></div><div id="loadingMsg">' + (msg || 'Carregando contatos...') + '</div></div></td></tr>';
}

function setError(msg) {
    loading = false;
    loadError = msg;
    var tbody = document.getElementById('contactsBody');
    tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><div class="icon" style="font-size:2rem">&#9888;</div><div class="err">' + msg + '</div><div style="margin-top:12px"><button class="btn btn-primary" onclick="loadContacts()">Tentar novamente</button></div></div></td></tr>';
}

async function checkStatus() {
    try {
        var res = await fetch('/api/status');
        var data = await res.json();
        var dot = document.getElementById('statusDot');
        var text = document.getElementById('statusText');
        var badge = document.getElementById('statusBadge');
        if (data.pronto) {
            dot.className = 'status-dot online';
            text.textContent = 'Bot online';
            badge.className = 'status-badge online';
            return true;
        } else {
            dot.className = 'status-dot offline';
            text.textContent = data.status || 'Offline';
            badge.className = 'status-badge offline';
            return false;
        }
    } catch(e) {
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Sem conexao';
        document.getElementById('statusBadge').className = 'status-badge offline';
        return false;
    }
}

async function loadContacts() {
    setLoading('Carregando contatos...');
    try {
        var res = await fetch('/api/contatos');
        var data = await res.json();
        if (data.success && data.contatos) {
            contacts = data.contatos;
            loading = false;
            loadError = null;
            document.getElementById('totalContatos').textContent = contacts.length;
            var blockedCount = contacts.filter(function(c){ return c.bloqueado; }).length;
            document.getElementById('totalBloqueados').textContent = blockedCount;
            renderContacts();
            if (data.cache) {
                showToast('Contatos carregados do cache', 'success');
            }
        } else {
            var errMsg = data.error || 'Erro desconhecido';
            setError(errMsg);
            showToast('Erro: ' + errMsg, 'error');
        }
    } catch(e) {
        setError('Falha de conexao com o servidor');
        showToast('Erro de conexao', 'error');
    }
}

function renderContacts() {
    if (loading) return;
    if (loadError) return;

    var tbody = document.getElementById('contactsBody');
    var searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();
    var filtered = contacts.slice();

    if (showOnlyBlocked) {
        filtered = filtered.filter(function(c){ return c.bloqueado; });
    }

    if (searchTerm) {
        filtered = filtered.filter(function(c){
            return (c.nome || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                   (c.numero || '').indexOf(searchTerm) !== -1;
        });
    }

    if (filtered.length === 0) {
        var icon = showOnlyBlocked ? '&#128274;' : '&#128269;';
        var msg = showOnlyBlocked ? 'Nenhum contato bloqueado' : (searchTerm ? 'Nenhum contato encontrado' : 'Nenhum contato salvo na agenda');
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><div class="icon">' + icon + '</div><div>' + msg + '</div></div></td></tr>';
        return;
    }

    var html = '';
    for (var i = 0; i < filtered.length; i++) {
        var c = filtered[i];
        var blockedClass = c.bloqueado ? 'blocked-row' : '';
        var youBadge = c.isMe ? '<span class="badge badge-you">Voce</span>' : '';
        var blockedBadge = c.bloqueado ? '<span class="badge badge-blocked">Bloqueado</span>' : '';
        var nome = escapeHtml(c.nome || 'Sem nome');
        var checked = c.bloqueado ? ' checked' : '';
        var labelClass = c.bloqueado ? 'blocked' : 'active';
        var labelText = c.bloqueado ? 'Desligado' : 'Ligado';

        html += '<tr class="' + blockedClass + '">';
        html += '<td><div class="contact-name">' + nome + ' ' + youBadge + ' ' + blockedBadge + '</div></td>';
        html += '<td><span class="contact-number">+' + c.numero + '</span></td>';
        html += '<td><div class="toggle-wrapper">';
        html += '<label class="toggle" onclick="event.preventDefault();toggleBlock(\'' + c.numero + '\',' + c.bloqueado + ')">';
        html += '<input type="checkbox"' + checked + '>';
        html += '<span class="toggle-slider"></span>';
        html += '</label>';
        html += '<span class="toggle-label ' + labelClass + '">' + labelText + '</span>';
        html += '</div></td>';
        html += '</tr>';
    }
    tbody.innerHTML = html;
}

async function toggleBlock(numero, currentlyBlocked) {
    var endpoint = currentlyBlocked ? '/api/desbloquear/' : '/api/bloquear/';
    try {
        var res = await fetch(endpoint + numero, { method: 'POST' });
        var data = await res.json();
        if (data.success) {
            for (var i = 0; i < contacts.length; i++) {
                if (contacts[i].numero === numero) {
                    contacts[i].bloqueado = !currentlyBlocked;
                    break;
                }
            }
            document.getElementById('totalBloqueados').textContent = contacts.filter(function(c){ return c.bloqueado; }).length;
            renderContacts();
            showToast(currentlyBlocked ? 'Bot reativado para este contato' : 'Bot desligado para este contato', 'success');
        } else {
            showToast(data.error || 'Erro na operacao', 'error');
        }
    } catch(e) {
        showToast('Erro de conexao', 'error');
    }
}

function toggleBlockedFilter() {
    showOnlyBlocked = !showOnlyBlocked;
    document.getElementById('btnFilterBlocked').textContent = showOnlyBlocked ? 'Mostrar todos' : 'Bloqueados';
    renderContacts();
}

async function refreshContacts() {
    var btn = document.getElementById('btnRefresh');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> Atualizando...';
    try {
        var res = await fetch('/api/contatos/refresh', { method: 'POST' });
        if (res.ok) {
            await loadContacts();
            showToast('Contatos atualizados', 'success');
        } else {
            showToast('Erro ao atualizar cache', 'error');
        }
    } catch(e) {
        showToast('Erro ao atualizar contatos', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '&#8635; Atualizar';
}

function showToast(message, type) {
    var existing = document.querySelector('.toast');
    if (existing) existing.remove();
    var toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(function(){ toast.remove(); }, 3000);
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

(async function init() {
    var ready = await checkStatus();
    if (!ready) {
        setError('Bot WhatsApp nao esta conectado. Aguarde a conexao e recarregue a pagina.');
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Aguardando conexao...';
    }
    await loadContacts();
    setInterval(checkStatus, 15000);
})();
</script>
</body>
</html>
